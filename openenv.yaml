spec_version: 1
name: ml-pipeline-debugger
version: "0.1.0"
type: standard
description: >
  An OpenEnv-compliant RL environment where an LLM agent debugs broken ML
  training pipelines. The agent receives structured observations (architecture
  summaries, tensor shapes, error traces, epoch metrics) and issues typed
  actions to resolve real ML engineering failures — no GPU required.
author: ml-pipeline-debugger-team
license: MIT

runtime: python
app: server.app:app
port: 7860

tasks:
  - id: easy
    name: "CV Shape Error"
    difficulty: easy
    max_steps: 15
    success_threshold: 1.0
    description: >
      Fix a tensor reshape mismatch in a CNN. Flatten outputs 512 features
      but Linear expects 2304 (64x6x6). Agent must submit correct FixReshape.

  - id: medium
    name: "NLP Overfitting"
    difficulty: medium
    max_steps: 15
    success_threshold: 0.8
    description: >
      Resolve catastrophic overfitting in a Transformer classifier.
      Apply dropout and sequence truncation to close the val gap below 0.15.

  - id: hard
    name: "Lung Segmentation IoU"
    difficulty: hard
    max_steps: 15
    success_threshold: 0.85
    description: >
      Push cross-dataset lung segmentation IoU above 0.85 within 5 steps
      by tuning learning rate and Dice vs Cross-Entropy loss weights.

tags:
  - openenv
  - ml-debugging
  - llm-agent
  - cpu-only